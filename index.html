<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Visual Extremo</title>
    <style>
        :root {
            --tiktok-red: #ff0050;
            --tiktok-cyan: #00f2ea;
            --dark: #010101;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; font-family: 'Montserrat', sans-serif;
            overflow: hidden; background: var(--dark); color: white;
        }

        #bg-video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; 
            filter: brightness(0.3) blur(2px);
            z-index: -1;
        }

        .app-container {
            max-width: 420px; height: 100vh;
            margin: 0 auto; position: relative;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-left: 1px solid #333; border-right: 1px solid #333;
            background: rgba(0,0,0,0.1);
        }

        #menu, #game-screen, #result-screen {
            text-align: center; width: 90%; display: none;
        }

        .active { display: block !important; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn {
            background: white; color: black;
            border: none; padding: 18px 40px;
            font-weight: bold; font-size: 1.1rem;
            border-radius: 5px; cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--tiktok-red), -4px -4px 0px var(--tiktok-cyan);
            transition: 0.2s;
        }
        
        .btn:active { transform: scale(0.95); }

        .grid {
            display: grid; gap: 5px;
            margin: 20px 0; background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 15px;
        }

        .cell {
            background: rgba(255,255,255,0.1);
            display: flex; align-items: center;
            justify-content: center; font-size: 1.8rem;
            aspect-ratio: 1/1; cursor: pointer;
            border-radius: 8px; transition: 0.1s;
            user-select: none;
        }

        .cell:active { transform: scale(0.8); background: var(--tiktok-cyan); }

        .timer-container {
            width: 100%; height: 12px;
            background: #222; border-radius: 10px; overflow: hidden;
            margin-top: 10px;
        }

        #progress {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, var(--tiktok-cyan), var(--tiktok-red));
        }

        h2 { font-size: 2.5rem; margin: 10px 0; text-shadow: 2px 2px var(--tiktok-red); }
        #lvl-tag { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop></video>

    <div class="app-container">
        <div id="menu" class="active">
            <h1 style="font-size: 3.5rem; margin-bottom: 0;">TE RETO</h1>
            <p style="letter-spacing: 5px; margin-bottom: 30px;">ENCUENTRA EL EMOJI</p>
            <button class="btn" onclick="startGame()">¡ACEPTO EL RETO!</button>
        </div>

        <div id="game-screen">
            <div id="lvl-tag" style="color: var(--tiktok-cyan)">NIVEL 1</div>
            <p>Busca este emoji:</p>
            <h2 id="instruction">?</h2>
            <div id="grid-container" class="grid"></div>
            <div class="timer-container"><div id="progress"></div></div>
        </div>

        <div id="result-screen">
            <h2 id="status-msg">¡TIEMPO AGOTADO!</h2>
            <p id="final-lvl" style="font-size: 1.2rem;">Llegaste al nivel 1</p>
            <p style="font-size: 1.5rem; color: var(--tiktok-cyan); font-weight: bold;">SÍGUENOS PARA MÁS</p>
            <button class="btn" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <script>
        const API_KEY = '38938115-4ffafdfccf94d14e4d35899f5'; 
        let currentLevel = 1;
        let timer;
        const synth = window.speechSynthesis;

        // Base de datos extendida de Emojis
        const emojis = [
            // Caras y personas
            "😀","😂","😍","🤡","👻","👽","🤖","💩","🤮","🤯","😎","🤠","🥵","🥶","🥳","🫠","🧐","👾","👺","👹",
            // Animales
            "🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐻‍❄️","🐨","🐯","🦁","🐮","🐷","🐸","🐙","🐵","🦄","🐲","🦞","🐝","🐜","🐍",
            // Comida
            "🍎","🥑","🥦","🥨","🍔","🍟","🍕","🌮","🍣","🍿","🍩","🍦","🍺","🍹","🧉","🍓","🍒","🍍","🍉",
            // Objetos y Símbolos
            "🔥","💎","👑","🚀","🎸","🎮","🎲","🎱","🥇","🎬","🎤","🎧","🎨","🧩","🧪","🧿","🧨","✨","🌈","⚡","⚽","🏀","💣"
        ];

        async function fetchVideo() {
            try {
                const res = await fetch(`https://pixabay.com/api/videos/?key=${API_KEY}&q=dark+neon+motion&per_page=15`);
                const data = await res.json();
                const vid = data.hits[Math.floor(Math.random() * data.hits.length)].videos.medium.url;
                document.getElementById('bg-video').src = vid;
            } catch(e) { console.warn("Error cargando video de fondo."); }
        }

        function speak(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'es-ES';
            utter.rate = 1.3;
            synth.speak(utter);
        }

        function startGame() {
            showScreen('game-screen');
            loadLevel();
        }

        function loadLevel() {
            if(currentLevel % 5 === 0) fetchVideo(); // Cambia video cada 5 niveles
            
            // Dificultad progresiva: cuadrícula más grande cada pocos niveles
            let size = 4;
            if(currentLevel > 3) size = 5;
            if(currentLevel > 7) size = 6;
            if(currentLevel > 15) size = 8;
            if(currentLevel > 30) size = 10;

            // Selección de emojis (Asegurar que sean diferentes)
            const target = emojis[Math.floor(Math.random() * emojis.length)];
            let filler = emojis[Math.floor(Math.random() * emojis.length)];
            while(filler === target) {
                filler = emojis[Math.floor(Math.random() * emojis.length)];
            }

            speak(`Nivel ${currentLevel}. Busca el emoji ${target}`);

            document.getElementById('instruction').innerText = target;
            document.getElementById('lvl-tag').innerText = `NIVEL ${currentLevel}`;
            
            const grid = document.getElementById('grid-container');
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            grid.innerHTML = '';

            const total = size * size;
            const targetIndex = Math.floor(Math.random() * total);

            // Ajustar tamaño de fuente según cantidad de celdas
            const fontSize = size > 6 ? '1.2rem' : '1.8rem';

            for(let i=0; i<total; i++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.style.fontSize = fontSize;
                div.innerText = (i === targetIndex) ? target : filler;
                div.onclick = () => {
                    if(i === targetIndex) {
                        currentLevel++;
                        loadLevel();
                    } else {
                        endGame("¡ERROR! TE EQUIVOCASTE");
                    }
                };
                grid.appendChild(div);
            }
            resetTimer();
        }

        function resetTimer() {
            clearTimeout(timer);
            const bar = document.getElementById('progress');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            // Tiempo más corto conforme subes de nivel (Mínimo 3 segundos)
            const timeLimit = Math.max(3000, 10000 - (currentLevel * 300));

            setTimeout(() => {
                bar.style.transition = `width ${timeLimit}ms linear`;
                bar.style.width = '0%';
            }, 50);

            timer = setTimeout(() => endGame("¡TIEMPO AGOTADO!"), timeLimit);
        }

        function endGame(msg) {
            clearTimeout(timer);
            document.getElementById('status-msg').innerText = msg;
            document.getElementById('final-lvl').innerText = `Llegaste al Nivel ${currentLevel}`;
            showScreen('result-screen');
            speak(msg + ". Síguenos para más retos.");
        }

        function showScreen(id) {
            document.getElementById('menu').classList.remove('active');
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById(id).classList.add('active');
        }

        fetchVideo();
    </script>
</body>
</html>
