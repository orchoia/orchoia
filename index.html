<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Visual con Voz</title>
    <style>
        :root {
            --tiktok-red: #ff0050;
            --tiktok-cyan: #00f2ea;
            --dark: #010101;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; font-family: 'Montserrat', sans-serif;
            overflow: hidden; background: var(--dark); color: white;
        }

        #bg-video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; 
            filter: brightness(0.3) blur(2px);
        }

        .app-container {
            max-width: 420px; height: 100vh;
            margin: 0 auto; position: relative;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-left: 1px solid #333; border-right: 1px solid #333;
            background: rgba(0,0,0,0.6);
        }

        #menu, #game-screen, #result-screen {
            text-align: center; width: 90%; display: none;
        }

        .active { display: block !important; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn {
            background: white; color: black;
            border: none; padding: 18px 40px;
            font-weight: bold; font-size: 1.1rem;
            border-radius: 5px; cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--tiktok-red), -4px -4px 0px var(--tiktok-cyan);
        }

        .grid {
            display: grid; gap: 8px;
            margin: 30px 0; background: rgba(255,255,255,0.05);
            padding: 15px; border-radius: 15px;
        }

        .cell {
            background: rgba(255,255,255,0.1);
            display: flex; align-items: center;
            justify-content: center; font-size: 2rem;
            aspect-ratio: 1/1; cursor: pointer;
            border-radius: 8px; transition: 0.1s;
        }

        .cell:active { transform: scale(0.9); background: var(--tiktok-cyan); }

        .timer-container {
            width: 100%; height: 12px;
            background: #222; border-radius: 10px; overflow: hidden;
        }

        #progress {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, var(--tiktok-cyan), var(--tiktok-red));
        }

        h2 { font-size: 2.5rem; text-shadow: 2px 2px var(--tiktok-red); }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop></video>

    <div class="app-container">
        <div id="menu" class="active">
            <h1 style="font-size: 3rem;">TE RETO</h1>
            <p>Nivel 1 al 100</p>
            <button class="btn" onclick="startGame()">¡ACEPTO EL RETO!</button>
        </div>

        <div id="game-screen">
            <div id="lvl-tag" style="color: var(--tiktok-cyan)">Nivel 1</div>
            <h2 id="instruction">Busca...</h2>
            <div id="grid-container" class="grid"></div>
            <div class="timer-container"><div id="progress"></div></div>
        </div>

        <div id="result-screen">
            <h2 id="status-msg">¡TIEMPO AGOTADO!</h2>
            <p style="font-size: 1.5rem; color: var(--tiktok-cyan)">SÍGUENOS PARA MÁS</p>
            <button class="btn" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <script>
        const API_KEY = '38938115-4ffafdfccf94d14e4d35899f5'; 
        let currentLevel = 1;
        let timer;
        const synth = window.speechSynthesis;

        async function fetchVideo() {
            try {
                const res = await fetch(`https://pixabay.com/api/videos/?key=${API_KEY}&q=cyberpunk+motion&per_page=10`);
                const data = await res.json();
                const vid = data.hits[Math.floor(Math.random() * data.hits.length)].videos.medium.url;
                document.getElementById('bg-video').src = vid;
            } catch(e) { console.warn("API Key no válida o error de red."); }
        }

        function speak(text) {
            synth.cancel(); // Detener cualquier voz previa
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'es-ES';
            utter.rate = 1.2;
            synth.speak(utter);
        }

        function startGame() {
            showScreen('game-screen');
            loadLevel();
        }

        function loadLevel() {
            fetchVideo();
            const isEmoji = currentLevel % 2 === 0;
            const size = currentLevel < 5 ? 6 : (currentLevel < 15 ? 8 : 12);
            const items = isEmoji ? ["🔥","💀","👑","🤡","👻","👽","🤖"] : "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            
            const target = items[Math.floor(Math.random() * items.length)];
            let filler = items[Math.floor(Math.random() * items.length)];
            while(filler === target) filler = items[Math.floor(Math.random() * items.length)];

            // LA VOZ HABLA AQUÍ
            speak(`Te reto a encontrar ${isEmoji ? 'el emoji' : 'la letra'} ${target}`);

            document.getElementById('instruction').innerText = target;
            document.getElementById('lvl-tag').innerText = `NIVEL ${currentLevel}`;
            
            const grid = document.getElementById('grid-container');
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            grid.innerHTML = '';

            const total = size * size;
            const targetIndex = Math.floor(Math.random() * total);

            for(let i=0; i<total; i++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = (i === targetIndex) ? target : filler;
                div.onclick = () => {
                    if(i === targetIndex) {
                        currentLevel++;
                        loadLevel();
                    } else {
                        endGame();
                    }
                };
                grid.appendChild(div);
            }
            resetTimer();
        }

        function resetTimer() {
            clearTimeout(timer);
            const bar = document.getElementById('progress');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            setTimeout(() => {
                bar.style.transition = 'width 10s linear';
                bar.style.width = '0%';
            }, 100);

            timer = setTimeout(endGame, 10000);
        }

        function endGame() {
            showScreen('result-screen');
            speak("Síguenos para más");
        }

        function showScreen(id) {
            document.querySelectorAll('.app-container > div').forEach(d => d.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        fetchVideo();
    </script>
</body>
</html>
